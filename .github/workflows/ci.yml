name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: build + vet + test (coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Python  # for the Python Blade oracle (differential harness)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Checkout Python Blade (oracle)
        uses: actions/checkout@v4
        with:
          repository: blade-build/blade-build
          ref: master
          path: blade-build

      - name: Install build tools  # cc/proto end-to-end tests (gcc/g++ preinstalled)
        run: sudo apt-get update && sudo apt-get install -y ninja-build protobuf-compiler libprotobuf-dev pkg-config

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        env:
          BLADE_PY: ${{ github.workspace }}/blade-build/blade
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1
